                                    <li class="flex items-start gap-1.5"><i data-lucide="trending-up" class="w-4 h-4 text-narasi-red shrink-0 mt-0.5"></i> <span><strong class="text-narasi-charcoal transition-colors duration-500" id="slide7-strong-3">Transparansi POS:</strong> Seluruh data penjualan terintegrasi di sistem Cloud yang dapat dipantau langsung oleh pemilik modal setiap hari.</span></li>
                                </ul>
                            </div>
                            
                            <div class="bg-stone-50 border border-stone-200 p-4 rounded-xl space-y-2" id="slide7-calc-card">
                                <span class="text-[9px] font-black text-narasi-red tracking-widest uppercase block">Kalkulator Omset & Hak Investor</span>
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="text-stone-500 font-medium" id="slide7-calc-label">Target Penjualan (Cup/Hari):</span>
                                    <span class="font-bold text-narasi-charcoal transition-colors duration-500" id="calc-vol-txt">50 Cup</span>
                                </div>
                                <input type="range" min="20" max="150" value="50" class="w-full h-1 bg-stone-200 rounded-lg appearance-none cursor-pointer" id="calc-volume" oninput="liveEstimate(this.value)">
                                
                                <div class="flex justify-between items-center text-[10px] text-stone-500 border-t border-stone-200/80 pt-2 font-semibold">
                                    <span id="slide7-revenue-label">Estimasi Total Omset / Bulan:</span>
                                    <span id="est-revenue" class="text-narasi-charcoal transition-colors duration-500">Rp27.000.000</span>
                                </div>
                                
                                <div class="flex justify-between items-center text-[11px] font-extrabold bg-narasi-red/5 p-2 rounded-lg mt-1 border border-narasi-red/10">
                                    <span class="text-narasi-red">Hak Pemilik Modal (15% Revenue Share):</span>
                                    <span id="est-share" class="text-narasi-red">Rp4.050.000</span>
                                </div>
                                <p class="text-[9px] text-stone-400 italic leading-tight mt-1">*Asumsi harga rata-rata Rp18.000/cup. .</p>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 8,
                category: "08. PENUTUP & KONTRAK SOSIAL",
                title: "Bertumbuh Bersama Narasi",
                content: `
                    <div class="text-center py-4 space-y-5">
                        <span class="text-xs font-black tracking-widest text-narasi-red uppercase bg-narasi-red/5 px-3 py-1 rounded-full">KONTRAK KOLABORASI</span>
                        <h2 class="text-3xl md:text-4xl font-serif italic text-narasi-charcoal leading-relaxed max-w-xl mx-auto transition-colors duration-500" id="slide8-h2">
                            "Kami mengubah ruang yang diam menjadi ruang yang hidup, produktif, dan memiliki cerita."
                        </h2>
                        <p class="text-xs text-stone-500 font-semibold uppercase tracking-widest" id="slide8-p">Mari Bertumbuh Bersama Melalui Kolaborasi yang Saling Menguntungkan.</p>
                        <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                            <span class="px-4 py-2 bg-stone-100 rounded-xl text-[10px] font-bold text-stone-600 border border-stone-200/60 flex items-center gap-2" id="slide8-badge-1"><i data-lucide="check" class="w-4 h-4 text-narasi-red"></i> Hubungi Manajemen Survey</span>
                            <span class="px-4 py-2 bg-stone-100 rounded-xl text-[10px] font-bold text-stone-600 border border-stone-200/60 flex items-center gap-2" id="slide8-badge-2"><i data-lucide="check" class="w-4 h-4 text-narasi-red"></i> Setup 3 Hari, Mulai Menyeduh</span>
                        </div>
                    </div>
                `
            }
        ];

        let currentIdx = 0;
        let isDarkCozyAtmosphere = false; 

        // Startup actions
        window.onload = function() {
            renderSlideOutline();
            renderActiveSlide(currentIdx);
            setupSlideSwipes();
            lucide.createIcons();
        }

        // Render left-side panel slide menu
        function renderSlideOutline() {
            const container = document.getElementById('slide-outline-container');
            container.innerHTML = '';
            SLIDES.forEach((slide, idx) => {
                const button = document.createElement('button');
                button.id = `outline-item-${idx}`;
                button.className = `w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 group ${idx === currentIdx ? 'bg-white border-narasi-red shadow-sm' : 'bg-transparent border-transparent hover:bg-white/40'}`;
                button.onclick = () => jumpToSlide(idx);
                
                button.innerHTML = `
                    <span class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0 ${idx === currentIdx ? 'bg-narasi-red text-white' : 'bg-stone-200 text-stone-500 group-hover:bg-stone-300'}" id="outline-num-${idx}">
                        ${String(idx + 1).padStart(2, '0')}
                    </span>
                    <div class="truncate">
                        <p class="text-[9px] font-bold text-stone-400 uppercase tracking-wider truncate">${slide.category}</p>
                        <p class="text-xs font-bold text-narasi-charcoal truncate transition-colors duration-500" id="outline-title-${idx}">${slide.title}</p>
                    </div>
                `;
                container.appendChild(button);
            });
        }

        // Menampilkan konten slide aktif dengan efek transisi
        function renderActiveSlide(idx) {
            const viewport = document.getElementById('slide-body-viewport');
            
            viewport.classList.remove('slide-active');
            viewport.classList.add('slide-enter');
            
            setTimeout(() => {
                const slide = SLIDES[idx];
                viewport.innerHTML = slide.content;
                
                document.getElementById('active-category').innerText = slide.category;
                document.getElementById('current-index-num').innerText = String(idx + 1).padStart(2, '0');
                document.getElementById('total-slides-num').innerText = String(SLIDES.length).padStart(2, '0');
                
                // Rotasi dekorasi watermark
                const watermark = document.getElementById('slide-watermark');
                if (watermark) {
                    watermark.style.transform = `rotate(${idx * 45}deg) scale(${1 + (idx * 0.05)})`;
                }
                
                // Sinkronisasi status outline kiri
                SLIDES.forEach((_, sIdx) => {
                    const btn = document.getElementById(`outline-item-${sIdx}`);
                    const num = document.getElementById(`outline-num-${sIdx}`);
                    if (btn && num) {
                        if (sIdx === idx) {
                            btn.className = "w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 group bg-white border-narasi-red shadow-sm";
                            num.className = "w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0 bg-narasi-red text-white";
                        } else {
                            btn.className = "w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 group bg-transparent border-transparent hover:bg-white/40";
                            num.className = "w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0 bg-stone-200 text-stone-500 group-hover:bg-stone-300";
                        }
                    }
                });

                // Jalankan fungsi kalkulator bawaan jika slide 7 dibuka pertama kali
                if(idx === 6) {
                    liveEstimate(50);
                }

                lucide.createIcons();
                applyThemeStyles();
                
                viewport.classList.remove('slide-enter');
                viewport.classList.add('slide-active');
            }, 150);
        }

        // Navigasi Slide
        function nextSlide() {
            if (currentIdx < SLIDES.length - 1) {
                currentIdx++;
                renderActiveSlide(currentIdx);
            }
        }

        function prevSlide() {
            if (currentIdx > 0) {
                currentIdx--;
                renderActiveSlide(currentIdx);
            }
        }

        function jumpToSlide(idx) {
            currentIdx = idx;
            renderActiveSlide(currentIdx);
        }

        // Listener Navigasi Keyboard
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Touch Swipe Gestures
        let touchstartX = 0;
        let touchendX = 0;
        
        function setupSlideSwipes() {
            const frame = document.getElementById('main-slide-frame');
            if (frame) {
                frame.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, false);
                frame.addEventListener('touchend', e => {
                    touchendX = e.changedTouches[0].screenX;
                    handleSwipeGesture();
                }, false);
            }
        }

        function handleSwipeGesture() {
            if (touchstartX - touchendX > 50) nextSlide();
            if (touchendX - touchstartX > 50) prevSlide();
        }

        // Logika Simulator Tab Kemitraan (Slide 6) - Memperbaiki Bug Skema Dua Pilar
        function setTab(type) {
            const tabPengelola = document.getElementById('tab-pengelola');
            const tabInvestor = document.getElementById('tab-investor');
            const badge = document.getElementById('tab-badge');
            const title = document.getElementById('tab-title');
            const desc = document.getElementById('tab-desc');
            
            if(tabPengelola && tabInvestor) {
                tabPengelola.className = "flex-1 text-center py-1.5 text-[10px] font-black rounded-md text-stone-500 hover:text-narasi-charcoal transition-all";
                tabInvestor.className = "flex-1 text-center py-1.5 text-[10px] font-black rounded-md text-stone-500 hover:text-narasi-charcoal transition-all";
            }

            if (type === 'pengelola') {
                if(tabPengelola) tabPengelola.className = "flex-1 text-center py-1.5 text-[10px] font-black rounded-md bg-white shadow-sm text-narasi-red transition-all";
                if(badge) badge.innerText = "Mitra Pengelola";
                if(title) title.innerText = "Manajemen";
                if(desc) desc.innerHTML = `<strong class="text-narasi-charcoal" id="tab-bold-1">Kontribusi:</strong> Berkontribusi pada seluruh manajemen operasional, standarisasi menu cepat saji, pengelolaan SDM, hingga strategi pemasaran untuk memastikan ROI (Return on Investment) yang cepat.`;
            } else if (type === 'investor') {
                if(tabInvestor) tabInvestor.className = "flex-1 text-center py-1.5 text-[10px] font-black rounded-md bg-white shadow-sm text-narasi-red transition-all";
                if(badge) badge.innerText = "Mitra Investor";
                if(title) title.innerText = "Penyedia Dana (Pendanaan Modular)";
                if(desc) desc.innerHTML = `<strong class="text-narasi-charcoal" id="tab-bold-1">Kontribusi:</strong> Menyediakan modal finansial ringan untuk pengadaan alat seduh esensial, branding outlet, dan inventory awal.<br><strong class="text-narasi-charcoal" id="tab-bold-2">Manfaat:</strong> Bagi hasil berkala (revenue share 15%) dengan model risiko terkendali, dashboard laporan penjualan transparan, tanpa intervensi teknis harian.`;
            }
            applyThemeStyles();
        }

        // Logika Live ROI Share Estimator (Slide 7)
        function liveEstimate(cups) {
            const volTxt = document.getElementById('calc-vol-txt');
            if (volTxt) volTxt.innerText = `${cups} Cup`;
            
            const pricePerCup = 18000;
            const daysInMonth = 30;
            const revenue = cups * pricePerCup * daysInMonth;
            const investorShare = revenue * 0.15; 
            
            const estRevenueEl = document.getElementById('est-revenue');
            const estShareEl = document.getElementById('est-share');
            
            if (estRevenueEl) estRevenueEl.innerText = `Rp${revenue.toLocaleString('id-ID')}`;
            if (estShareEl) estShareEl.innerText = `Rp${investorShare.toLocaleString('id-ID')}`;
        }

        // Logika Tema: Pagi vs Senja
        function toggleAtmosphere() {
            isDarkCozyAtmosphere = !isDarkCozyAtmosphere;
            
            const themeBtn = document.getElementById('theme-btn');
            const themeText = document.getElementById('theme-text');
            const themeIcon = document.getElementById('theme-icon');
            
            if (isDarkCozyAtmosphere) {
                if(themeText) themeText.innerText = "Suasana Pagi";
                if(themeBtn) themeBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full border border-stone-700 hover:border-narasi-red text-xs font-semibold bg-stone-900 shadow-sm transition-all text-stone-300";
                if(themeIcon) {
                    themeIcon.setAttribute('data-lucide', 'sun');
                    themeIcon.className = "w-4 h-4 text-amber-400";
                }
            } else {
                if(themeText) themeText.innerText = "Suasana Senja";
                if(themeBtn) themeBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full border border-stone-200 hover:border-narasi-red text-xs font-semibold bg-white shadow-sm transition-all text-stone-700";
                if(themeIcon) {
                    themeIcon.setAttribute('data-lucide', 'sunset');
                    themeIcon.className = "w-4 h-4 text-amber-600";
                }
            }
            
            applyThemeStyles();
            lucide.createIcons();
        }

        // Manajemen Warna Kontras Dinamis (Pagi vs Senja)
        function applyThemeStyles() {
            const body = document.getElementById('body-theme');
            const header = document.getElementById('header-theme');
            const mainFrame = document.getElementById('main-slide-frame');
            const quoteCard = document.getElementById('sidebar-quote-card');
            const quoteText = document.getElementById('sidebar-quote-text');
            const brandTitle = document.getElementById('brand-title');
            const prevBtn = document.getElementById('prev-btn');
            const footerTip = document.getElementById('footer-tip');
            const indexCounter = document.getElementById('slide-index-counter');
            
            const charcoalTextElements = [
                'slide1-h2', 'slide2-h2', 'slide2-ul', 'slide3-h2', 'slide3-h4-1', 'slide3-h4-2', 'slide3-h4-3',
                'slide4-h2', 'slide5-h2', 'slide5-h4-1', 'slide5-h4-2', 'slide5-h4-3', 'slide5-h4-4',
                'slide6-h2', 'tab-title', 'slide7-h2', 'calc-vol-txt', 'est-revenue', 'slide7-strong-1', 
                'slide7-strong-2', 'slide7-strong-3', 'slide8-h2'
            ];

            const mutedTextElements = [
                'slide1-p', 'slide2-p', 'slide2-quote', 'slide3-p-1', 'slide3-p-2', 'slide3-p-3',
                'slide5-p-1', 'slide5-p-2', 'slide5-p-3', 'slide5-p-4', 'tab-desc', 'slide7-calc-label', 'slide7-revenue-label', 'slide8-p'
            ];

            const secondaryCards = [
                'slide2-card', 'slide3-card-1', 'slide3-card-2', 'slide3-card-3', 
                'slide5-card-1', 'slide5-card-2', 'slide5-card-3', 'slide5-card-4', 
                'slide6-tab-container', 'slide7-calc-card', 'slide8-badge-1', 'slide8-badge-2'
            ];

            if (isDarkCozyAtmosphere) {
                if(body) body.className = "bg-stone-950 text-stone-100 font-sans min-h-screen flex flex-col antialiased transition-colors duration-500";
                if(header) header.className = "bg-stone-900/90 backdrop-blur-md border-b border-stone-800 sticky top-0 z-50 px-4 py-3 md:px-8 transition-colors duration-500";
                if(mainFrame) mainFrame.className = "col-span-1 lg:col-span-3 flex flex-col justify-between min-h-[500px] bg-stone-900 rounded-3xl border border-stone-800 shadow-xl p-6 md:p-12 relative overflow-hidden transition-colors duration-500";
                if(quoteCard) quoteCard.className = "mt-6 p-4 rounded-2xl bg-stone-900 border border-stone-800 shadow-sm transition-colors duration-500";
                if(quoteText) quoteText.className = "text-[11px] italic text-stone-400 leading-relaxed";
                if(brandTitle) brandTitle.className = "text-xs md:text-sm font-extrabold tracking-widest text-stone-100 uppercase transition-colors duration-500";
                if(prevBtn) prevBtn.className = "flex-1 sm:flex-initial flex items-center justify-center gap-2 px-4 py-2 border border-stone-700 rounded-xl bg-stone-800 hover:bg-stone-700 text-stone-200 font-bold text-xs transition-all";
                if(footerTip) footerTip.className = "text-[10px] text-stone-400 font-bold uppercase tracking-wider flex items-center gap-1.5";
                if(indexCounter) indexCounter.className = "text-xs font-mono text-stone-400 font-semibold";

                charcoalTextElements.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) { el.classList.remove('text-narasi-charcoal'); el.classList.add('text-stone-100'); }
                });

                mutedTextElements.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) { el.classList.remove('text-stone-500'); el.classList.add('text-stone-400'); }
                });

                secondaryCards.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) { el.classList.remove('bg-stone-50', 'bg-stone-100', 'bg-white'); el.classList.add('bg-stone-950/40', 'border-stone-800'); }
                });

                const tabContentArea = document.getElementById('tab-content-area');
                if(tabContentArea) { tabContentArea.classList.remove('bg-white'); tabContentArea.classList.add('bg-stone-900', 'border-stone-800'); }

                const bold1 = document.getElementById('tab-bold-1'); if(bold1) { bold1.classList.remove('text-narasi-charcoal'); bold1.classList.add('text-stone-200'); }
                const bold2 = document.getElementById('tab-bold-2'); if(bold2) { bold2.classList.remove('text-narasi-charcoal'); bold2.classList.add('text-stone-200'); }

                SLIDES.forEach((_, idx) => {
                    const title = document.getElementById(`outline-title-${idx}`);
                    if(title) { title.classList.remove('text-narasi-charcoal'); title.classList.add('text-stone-300'); }
                });
            } else {
                if(body) body.className = "bg-narasi-cream text-narasi-charcoal font-sans min-h-screen flex flex-col antialiased transition-colors duration-500";
                if(header) header.className = "bg-white/80 backdrop-blur-md border-b border-stone-200/60 sticky top-0 z-50 px-4 py-3 md:px-8 transition-colors duration-500";
                if(mainFrame) mainFrame.className = "col-span-1 lg:col-span-3 flex flex-col justify-between min-h-[500px] bg-white rounded-3xl border border-stone-200/80 shadow-xl p-6 md:p-12 relative overflow-hidden transition-colors duration-500";
                if(quoteCard) quoteCard.className = "mt-6 p-4 rounded-2xl bg-white border border-stone-200/60 shadow-sm transition-colors duration-500";
                if(quoteText) quoteText.className = "text-[11px] italic text-stone-500 leading-relaxed";
                if(brandTitle) brandTitle.className = "text-xs md:text-sm font-extrabold tracking-widest text-narasi-charcoal uppercase transition-colors duration-500";
                if(prevBtn) prevBtn.className = "flex-1 sm:flex-initial flex items-center justify-center gap-2 px-4 py-2 border border-stone-300 rounded-xl hover:bg-stone-50 active:bg-stone-100 font-bold text-xs text-narasi-charcoal transition-all";
                if(footerTip) footerTip.className = "text-[10px] text-stone-500 font-bold uppercase tracking-wider flex items-center gap-1.5";
                if(indexCounter) indexCounter.className = "text-xs font-mono text-stone-500 font-semibold";

                charcoalTextElements.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) { el.classList.remove('text-stone-100'); el.classList.add('text-narasi-charcoal'); }
                });

                mutedTextElements.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) { el.classList.remove('text-stone-400'); el.classList.add('text-stone-500'); }
                });

                secondaryCards.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) { el.classList.remove('bg-stone-950/40', 'border-stone-800'); el.classList.add('bg-stone-50'); }
                });

                const tabContentArea = document.getElementById('tab-content-area');
                if(tabContentArea) { tabContentArea.classList.remove('bg-stone-900', 'border-stone-800'); tabContentArea.classList.add('bg-white'); }

                SLIDES.forEach((_, idx) => {
                    const title = document.getElementById(`outline-title-${idx}`);
                    if(title) { title.classList.remove('text-stone-300'); title.classList.add('text-narasi-charcoal'); }
                });
            }
        }
    </script>
</body>
</html>
