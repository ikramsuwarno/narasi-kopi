    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'Georgia', 'serif'],
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        narasi: {
                            red: '#961a16',      /* Pure Narasi Red */
                            redDark: '#75120f',  /* Deep Crimson */
                            charcoal: '#1a1513', /* Rich Off-black */
                            cream: '#FAF6F0',    /* Soft Warm Background */
                            clay: '#D9C5B2',     /* Accent Earth Tone */
                            stone: '#5C5450'     /* Muted Text */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .slide-enter {
            opacity: 0;
            transform: translateY(12px) scale(0.99);
        }
        .slide-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* Custom range styling */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #961a16;
            cursor: pointer;
            border: 2px solid #FAF6F0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #961a16;
            border-radius: 10px;
        }
    </style>
</head>

                                </ul>
                            </div>
                            
                            <!-- Embedded Live ROI Share Estimator -->
                            <div class="bg-stone-50 border border-stone-200 p-4 rounded-xl space-y-2">
                                <span class="text-[9px] font-black text-narasi-red tracking-widest uppercase block">Simulasi Bagi Hasil Bulanan</span>
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="text-narasi-stone font-medium">Penjualan (Cup/Hari):</span>
                                    <span class="font-bold text-narasi-charcoal transition-colors duration-500" id="calc-vol-txt">40 Cup</span>
                                </div>
                                <input type="range" min="20" max="150" value="40" class="w-full h-1 bg-stone-200 rounded-lg appearance-none cursor-pointer" id="calc-volume" oninput="liveEstimate(this.value)">
                                <div class="flex justify-between items-center text-[10px] text-narasi-stone border-t border-stone-200/80 pt-2 font-semibold">
                                    <span>Estimasi Omset Kedai:</span>
                                    <span id="est-revenue" class="text-narasi-charcoal transition-colors duration-500">Rp21.600.000</span>
                                </div>
                                <div class="flex justify-between items-center text-[11px] font-extrabold text-brand-900 bg-narasi-red/5 p-2 rounded-lg mt-1 border border-narasi-red/10">
                                    <span class="text-narasi-red">Hak Mitra Lahan (15%):</span>
                                    <span id="est-share" class="text-narasi-red">Rp3.240.000</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 8,
                category: "08. PENUTUP & KONTRAK SOSIAL",
                title: "Bertumbuh Bersama Narasi",
                content: `
                    <div class="text-center py-4 space-y-5">
                        <span class="text-xs font-black tracking-widest text-narasi-red uppercase bg-narasi-red/5 px-3 py-1 rounded-full">KONTRAK KOLABORASI</span>
                        <h2 class="text-3xl md:text-4xl font-serif italic text-narasi-charcoal leading-relaxed max-w-xl mx-auto transition-colors duration-500" id="slide8-h2">
                            "Kami mengubah ruang yang diam menjadi ruang yang hidup, produktif, dan memiliki cerita."
                        </h2>
                        <p class="text-xs text-narasi-stone font-semibold uppercase tracking-widest">Mari Bertumbuh Bersama Melalui Kolaborasi yang Saling Menguntungkan.</p>
                        <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                            <span class="px-4 py-2 bg-stone-100 rounded-xl text-[10px] font-bold text-stone-600 border border-stone-200/60 flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-narasi-red"></i> Hubungi Manajemen Survey</span>
                            <span class="px-4 py-2 bg-stone-100 rounded-xl text-[10px] font-bold text-stone-600 border border-stone-200/60 flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-narasi-red"></i> Setup 3 Hari, Mulai Menyeduh</span>
                        </div>
                    </div>
                `
            }
        ];

        let currentIdx = 0;
        let isDarkCozyAtmosphere = false; // "Pagi" (light) by default

        // Startup actions
        window.onload = function() {
            renderSlideOutline();
            renderActiveSlide(currentIdx);
            
            // Add swipe action listeners
            setupSlideSwipes();
            
            // Initialize lucide
            lucide.createIcons();
        }

        // Render left-side panel slide menu
        function renderSlideOutline() {
            const container = document.getElementById('slide-outline-container');
            container.innerHTML = '';
            SLIDES.forEach((slide, idx) => {
                const button = document.createElement('button');
                button.id = `outline-item-${idx}`;
                button.className = `w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 group ${idx === 0 ? 'bg-white border-narasi-red shadow-sm' : 'bg-transparent border-transparent hover:bg-white/40'}`;
                button.onclick = () => jumpToSlide(idx);
                
                button.innerHTML = `
                    <span class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0 ${idx === 0 ? 'bg-narasi-red text-white' : 'bg-stone-200 text-stone-500 group-hover:bg-stone-300'}" id="outline-num-${idx}">
                        ${(idx + 1).toString().padStart(2, '0')}
                    </span>
                    <div class="min-w-0">
                        <span class="block text-[8px] font-black tracking-widest text-narasi-stone uppercase">${slide.category}</span>
                        <span class="block text-xs font-extrabold text-narasi-charcoal transition-colors duration-500 truncate" id="outline-title-${idx}">${slide.title}</span>
                    </div>
                `;
                container.appendChild(button);
            });
        }

        function renderActiveSlide(index) {
            const slide = SLIDES[index];
            const viewport = document.getElementById('slide-body-viewport');
            
            // Trigger transition exit
            viewport.className = "flex-1 flex flex-col justify-center py-4 z-10 relative slide-enter";
            
            setTimeout(() => {
                // Change values
                document.getElementById('active-category').innerText = slide.category;
                document.getElementById('current-index-num').innerText = slide.id.toString().padStart(2, '0');
                viewport.innerHTML = slide.content;

                // Sync active menu state
                SLIDES.forEach((_, idx) => {
                    const btn = document.getElementById(`outline-item-${idx}`);
                    const num = document.getElementById(`outline-num-${idx}`);
                    if (btn && num) {
                        if (idx === index) {
                            btn.className = `w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 group bg-white border-narasi-red shadow-sm ${isDarkCozyAtmosphere ? '!bg-narasi-charcoal !border-narasi-red' : ''}`;
                            num.className = "w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0 bg-narasi-red text-white";
                        } else {
                            btn.className = "w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 group bg-transparent border-transparent hover:bg-white/40";
                            num.className = `w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0 ${isDarkCozyAtmosphere ? 'bg-stone-800 text-stone-400' : 'bg-stone-200 text-stone-500 group-hover:bg-stone-300'}`;
                        }
                    }
                });

                // Update icon references
                lucide.createIcons();

                // Fire custom visual elements on specific slides (e.g. Slide 7 calculator update)
                if (slide.id === 7) {
                    liveEstimate(40);
                }

                // Apply Dark Cozy styling if turned on
                if (isDarkCozyAtmosphere) {
                    applyAtmosphereColors();
                }

                // Slide animation enter
                viewport.className = "flex-1 flex flex-col justify-center py-4 z-10 relative slide-active";
            }, 150);
        }

        function jumpToSlide(index) {
            currentIdx = index;
            renderActiveSlide(currentIdx);
        }

        function nextSlide() {
            if (currentIdx < SLIDES.length - 1) {
                currentIdx++;
            } else {
                currentIdx = 0; // wrap-around
            }
            renderActiveSlide(currentIdx);
        }

        function prevSlide() {
            if (currentIdx > 0) {
                currentIdx--;
            } else {
                currentIdx = SLIDES.length - 1; // wrap-around
            }
            renderActiveSlide(currentIdx);
        }

        // Slide 6 tab interactivity
        function setTab(role) {
            const tabLahan = document.getElementById('tab-lahan');
            const tabInvestor = document.getElementById('tab-investor');
            const tabOperasional = document.getElementById('tab-operasional');
            const contentArea = document.getElementById('tab-content-area');

            // Reset tab highlights
            [tabLahan, tabInvestor, tabOperasional].forEach(btn => {
                if (btn) {
                    btn.className = `flex-1 text-center py-1.5 text-[10px] font-black rounded-md transition-all ${isDarkCozyAtmosphere ? 'text-stone-400 hover:text-stone-200' : 'text-narasi-stone hover:text-narasi-charcoal'}`;
                }
            });

            let title = "";
            let badge = "";
            let text = "";

            if (role === 'lahan') {
                tabLahan.className = `flex-1 text-center py-1.5 text-[10px] font-black rounded-md bg-white shadow-sm text-narasi-red transition-all ${isDarkCozyAtmosphere ? '!bg-narasi-red !text-white' : ''}`;
                badge = "Mitra Lahan";
                title = "Pemilik Aset Pasif";
                text = `<strong class="text-narasi-charcoal ${isDarkCozyAtmosphere ? '!text-white' : ''}">Kontribusi:</strong> Menyediakan halaman, ruko menganggur, bangunan kosong, atau pekarangan rumah strategis untuk dialih fungsi.<br>
                        <strong class="text-narasi-charcoal ${isDarkCozyAtmosphere ? '!text-white' : ''}">Manfaat:</strong> Aktivasi lahan menjadi estetik, peningkatan traffic kunjungan, serta passive income bagi hasil tiap bulan tanpa repot kelola operasional.`;
            } else if (role === 'investor') {
                tabInvestor.className = `flex-1 text-center py-1.5 text-[10px] font-black rounded-md bg-white shadow-sm text-narasi-red transition-all ${isDarkCozyAtmosphere ? '!bg-narasi-red !text-white' : ''}`;
                badge = "Mitra Investor";
                title = "Dukungan Permodalan";
                text = `<strong class="text-narasi-charcoal ${isDarkCozyAtmosphere ? '!text-white' : ''}">Kontribusi:</strong> Dukungan modal operasional atau peralatan modular bar untuk ekspansi.<br>
                        <strong class="text-narasi-charcoal ${isDarkCozyAtmosphere ? '!text-white' : ''}">Manfaat:</strong> Bagi hasil terstruktur dari profit bersih bulanan, pelaporan finansial transparan, & hak perluasan waralaba/cabang bersama.`;
            } else {
                tabOperasional.className = `flex-1 text-center py-1.5 text-[10px] font-black rounded-md bg-white shadow-sm text-narasi-red transition-all ${isDarkCozyAtmosphere ? '!bg-narasi-red !text-white' : ''}`;
                badge = "Mitra Operasional";
                title = "Pengelolaan & Manajemen";
                text = `<strong class="text-narasi-charcoal ${isDarkCozyAtmosphere ? '!text-white' : ''}">Kontribusi:</strong> Menyediakan keahlian F&B, tim Barista terlatih, pengawasan harian, & standarisasi mutu.<br>
                        <strong class="text-narasi-charcoal ${isDarkCozyAtmosphere ? '!text-white' : ''}">Manfaat:</strong> Pembagian hasil (profit sharing) berkelanjutan, komisi pengelolaan, & kesempatan mengembangkan sayap karir bersama ekosistem Narasi.`;
            }

            contentArea.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="px-2 py-0.5 bg-narasi-red/10 text-narasi-red font-bold text-[9px] rounded uppercase">${badge}</span>
                    <h4 class="font-extrabold text-xs text-narasi-charcoal transition-colors duration-500" id="tab-title">${title}</h4>
                </div>
                <p class="text-xs text-narasi-stone leading-relaxed" id="tab-desc">
                    ${text}
                </p>
            `;
            
            // Reapply theme colors to dynamic tab text if cozy mode is on
            if (isDarkCozyAtmosphere) {
                document.getElementById('tab-title').style.color = '#FFFFFF';
                document.getElementById('tab-desc').style.color = '#A0A0A0';
            }
        }

        // Slide 7 live estimate calculations
        function liveEstimate(val) {
            const volText = document.getElementById('calc-vol-txt');
            const estRevenue = document.getElementById('est-revenue');
            const estShare = document.getElementById('est-share');

            if (!volText) return; // Prevent break if slide hasn't loaded yet

            volText.innerText = `${val} Cup`;
            
            // Assume 18,000 IDR average pricing per cup
            const averagePrice = 18000;
            const monthlyRevenue = val * averagePrice * 30;
            const landlordShare = monthlyRevenue * 0.15; // 15% Share

            estRevenue.innerText = "Rp" + Math.round(monthlyRevenue).toLocaleString('id-ID');
            estShare.innerText = "Rp" + Math.round(landlordShare).toLocaleString('id-ID');
        }

        // Theme / Cozy Mood Switcher (Pagi vs Senja)
        function toggleAtmosphere() {
            isDarkCozyAtmosphere = !isDarkCozyAtmosphere;
            
            const body = document.getElementById('body-theme');
            const header = document.getElementById('header-theme');
            const themeBtn = document.getElementById('theme-btn');
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            const activeSlideFrame = document.getElementById('main-slide-frame');
            const quoteCard = document.getElementById('sidebar-quote-card');
            const brandTitle = document.getElementById('brand-title');

            if (isDarkCozyAtmosphere) {
                // Transition to cozy senja atmosphere
                body.className = "bg-narasi-charcoal text-white font-sans min-h-screen flex flex-col antialiased transition-colors duration-500";
                header.className = "bg-stone-900 border-b border-stone-800 sticky top-0 z-50 px-4 py-3 md:px-8 transition-colors duration-500";
                brandTitle.style.color = '#FFFFFF';
                
                themeBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full border border-stone-800 hover:border-narasi-red text-xs font-semibold bg-stone-900 text-white shadow-sm transition-all";
                themeIcon.setAttribute('data-lucide', 'sun');
                themeText.innerText = "Suasana Pagi";
                
                activeSlideFrame.className = "col-span-1 lg:col-span-3 flex flex-col justify-between min-h-[500px] bg-stone-900/60 border border-stone-800 shadow-2xl p-6 md:p-12 relative overflow-hidden transition-colors duration-500";
                
                if (quoteCard) {
                    quoteCard.className = "mt-6 p-4 rounded-2xl bg-stone-900 border border-stone-800 shadow-inner transition-colors duration-500";
                }
                
                // Active slide frame styling changes
                applyAtmosphereColors();
            } else {
                // Transition back to bright pagi atmosphere
                body.className = "bg-[#FAF6F0] text-narasi-charcoal font-sans min-h-screen flex flex-col antialiased transition-colors duration-500";
                header.className = "bg-white/80 backdrop-blur-md border-b border-stone-200/60 sticky top-0 z-50 px-4 py-3 md:px-8 transition-colors duration-500";
                brandTitle.style.color = '';

                themeBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full border border-stone-200 hover:border-narasi-red text-xs font-semibold bg-white shadow-sm transition-all text-stone-700";
                themeIcon.setAttribute('data-lucide', 'sunset');
                themeText.innerText = "Suasana Senja";
                
                activeSlideFrame.className = "col-span-1 lg:col-span-3 flex flex-col justify-between min-h-[500px] bg-white border border-stone-200/80 shadow-xl p-6 md:p-12 relative overflow-hidden transition-colors duration-500";
                
                if (quoteCard) {
                    quoteCard.className = "mt-6 p-4 rounded-2xl bg-white border border-stone-200/60 shadow-sm transition-colors duration-500";
                }

                // Revert all active titles color styling
                revertAtmosphereColors();
            }
            
            // Sync side list cards theme color
            renderActiveSlide(currentIdx);
            lucide.createIcons();
        }

        // Theme color helper functions to force elements dark cozy
        function applyAtmosphereColors() {
            // Apply text colors inside active slide card
            const titleElement1 = document.getElementById('slide1-h2');
            if (titleElement1) titleElement1.style.color = '#FFFFFF';
            const titleElement2 = document.getElementById('slide2-h2');
            if (titleElement2) {
                titleElement2.style.color = '#FFFFFF';
                document.getElementById('slide2-ul').style.color = '#FFFFFF';
            }
            const titleElement3 = document.getElementById('slide3-h2');
            if (titleElement3) {
                titleElement3.style.color = '#FFFFFF';
                document.getElementById('slide3-h4-1').style.color = '#FFFFFF';
                document.getElementById('slide3-h4-2').style.color = '#FFFFFF';
                document.getElementById('slide3-h4-3').style.color = '#FFFFFF';
            }
            const titleElement4 = document.getElementById('slide4-h2');
            if (titleElement4) titleElement4.style.color = '#FFFFFF';
            
            const titleElement5 = document.getElementById('slide5-h2');
            if (titleElement5) {
                titleElement5.style.color = '#FFFFFF';
                document.getElementById('slide5-h4-1').style.color = '#FFFFFF';
                document.getElementById('slide5-h4-2').style.color = '#FFFFFF';
                document.getElementById('slide5-h4-3').style.color = '#FFFFFF';
                document.getElementById('slide5-h4-4').style.color = '#FFFFFF';
            }
            const titleElement6 = document.getElementById('slide6-h2');
            if (titleElement6) {
                titleElement6.style.color = '#FFFFFF';
                // Active tabs
                document.getElementById('tab-title').style.color = '#FFFFFF';
                document.getElementById('tab-desc').style.color = '#A0A0A0';
            }
            const titleElement7 = document.getElementById('slide7-h2');
            if (titleElement7) {
                titleElement7.style.color = '#FFFFFF';
                document.getElementById('calc-vol-txt').style.color = '#FFFFFF';
                document.getElementById('est-revenue').style.color = '#FFFFFF';
                document.getElementById('slide7-strong-1').style.color = '#FFFFFF';
                document.getElementById('slide7-strong-2').style.color = '#FFFFFF';
                document.getElementById('slide7-strong-3').style.color = '#FFFFFF';
            }
            const titleElement8 = document.getElementById('slide8-h2');
            if (titleElement8) titleElement8.style.color = '#FFFFFF';
        }

        function revertAtmosphereColors() {
            // Remove inline stylings so they revert back to Tailwind styles
            const elementsToRevert = [
                'slide1-h2', 'slide2-h2', 'slide2-ul', 'slide3-h2', 'slide3-h4-1', 'slide3-h4-2', 'slide3-h4-3',
                'slide4-h2', 'slide5-h2', 'slide5-h4-1', 'slide5-h4-2', 'slide5-h4-3', 'slide5-h4-4',
                'slide6-h2', 'tab-title', 'tab-desc', 'slide7-h2', 'calc-vol-txt', 'est-revenue',
                'slide7-strong-1', 'slide7-strong-2', 'slide7-strong-3', 'slide8-h2'
            ];
            elementsToRevert.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.removeAttribute('style');
                }
            });
        }

        // Key bindings for arrow navigation
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // Swipe Gesture support for mobile devices
        function setupSlideSwipes() {
            const slideArea = document.getElementById('main-slide-frame');
            let startX = 0;
            let endX = 0;

            slideArea.addEventListener('touchstart', function(e) {
                startX = e.changedTouches[0].screenX;
            }, {passive: true});

            slideArea.addEventListener('touchend', function(e) {
                endX = e.changedTouches[0].screenX;
                const threshold = 60;
                if (startX - endX > threshold) {
                    nextSlide(); // Swiped left -> load next
                } else if (endX - startX > threshold) {
                    prevSlide(); // Swiped right -> load previous
                }
            }, {passive: true});
        }
    </script>
</body>
</html>
